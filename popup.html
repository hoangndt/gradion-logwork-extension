<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gradion Logwork</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <form id="logwork-form">
      <div class="field">
        <label for="date-input">Date</label>
        <input type="date" id="date-input" />
      </div>

      <div class="field">
        <label for="hours-input">Total Hours</label>
        <input type="number" id="hours-input" step="0.5" min="3" />
      </div>

      <div class="field">
        <label for="task-input">Task</label>
        <input type="text" id="task-input" placeholder="e.g. PROJ-123" />
      </div>

      <div class="field">
        <label for="description-input">Description</label>
        <textarea id="description-input" rows="3"></textarea>
      </div>

      <div class="actions">
        <button type="button" id="submit-btn">Submit</button>
        <button type="button" id="submit-afternoon-btn" hidden>Submit Afternoon Only</button>
      </div>

      <div class="status-row">
        <span id="token-status"></span>
      </div>

      <div id="message-area"></div>

      <ul id="entries-list"></ul>
    </form>

    <script src="popup.js"></script>
  </body>
</html>
